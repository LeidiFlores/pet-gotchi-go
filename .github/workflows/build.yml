name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      # 👇 Nuevo: deps nativas requeridas por Ebitengine en Linux
      - name: Install Ebitengine deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libgl1-mesa-dev xorg-dev

      - name: go mod download
        run: go mod download

      - name: Build desktop
        run: go build -v ./cmd/game

      - name: Build WASM
        run: |
          mkdir -p web
          GOOS=js GOARCH=wasm go build -o web/main.wasm ./cmd/game
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" web/
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: web/
